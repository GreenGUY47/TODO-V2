<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="upperPart">
            <ul>
                <li>
                    <p id="today">DD</p>
                </li>
                <li>
                    <p><span id="greet">HELLO</span></p>
                </li>
                <li>
                    <p id="dateOfTheDay">dd-mm-yy</p>
                </li>
            </ul>
        </div>
    </header>
    <main>
        <div class="inputContainer">
            <div class="containerInput">
            <div class="inputInner">
                <input type="text" placeholder="ENTER ANY TASK" class="textContainer" id="inputField">
            </div>
            <button class="btnAdd" id="btn">Add</button>
            </div>
        </div>
        <div id="mainContainer">
            <div id="main">
                
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
